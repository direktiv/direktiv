version: "3.9"
services:
  postgres:
    image: postgres:15
    command: [
        "postgres",
        ## "-c", "log_statement=all",
        ## "-c", "log_destination=stderr",
      ]
    environment:
      POSTGRES_USER: myadmin
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
      POSTGRES_INITDB_ARGS: "-A password"
    ports:
      - "5432:5432"
    volumes: []

  flow:
    image: direktiv
    command: ["/bin/direktiv", "server"]
    environment:
      - DIREKTIV_API_PORT=8181
      - DIREKTIV_DEBUG=true

      - DIREKTIV_DB=host=postgres port=5432 user=myadmin dbname=mydb password=mypassword sslmode=disable
      - DIREKTIV_SECRET_KEY=01234567890123456789012345678912
      - DIREKTIV_DISABLE_SERVICES=false

      - DIREKTIV_KNATIVE_NAMESPACE=direktiv-services-direktiv
      - DIREKTIV_FUNCTIONS_TIMEOUT=7200
      - DIREKTIV_LOG_JSON=console

      # for external Kubernetes/Knative connectivity
      - KUBERNETES_HOST=192.168.122.44:6443
      - INGRESS_HOST=192.168.122.44
      - KUBERNETES_TOKEN=eyJhbGciOiJSUzI1NiIsImtpZCI6InBnNE55Z1Y2QkNjdjBtRE84NlNSdjVGMjNWOXpVdWdzRnJIZVJ1cTh4SVUifQ..XnAbhGXE1IDGhMUNobNHCSpEqmIOQjlJTzWqWkH8HCeqk_siobXX9i2BSbkGhFQeogKzvxMr5LwUUNu3kIaNVYWr4Om2dEtkzlez4dBTqNfB1N-MSCRRbSm9kmEr-Zfctt8OuVW5dQG4ICPPg7TbqaUcAbuYd8980NRInpPD7oH3r35uxur2hYia2ADlkIZOruq3N_Ubmmx8xdQb0ZiBilvilz9OtGDCcpT-W-bkvLyE0VcTaqDVjXEZs_08SGSm7FZbd7Vqq3htipEI9GH9oNzVcRdgQiwiMce_95qjWsglECWifJtd-otJFfFnJl19Qj9onHprTYUsf5bj3jj0zA
      - DIREKTIV_KNATIVE_SERVICE_ACCOUNT=direktiv-knative-service-account
      - DIREKTIV_KNATIVE_INGRESS_CLASS=contour.ingress.networking.knative.dev
      - DIREKTIV_FLOW_ENDPOINT=192.168.178.106
      - DIREKTIV_KNATIVE_SIDECAR=direktiv/direktiv:v0.8.6
    ports:
      # api port
      - "8181:8181"
    depends_on:
      - postgres

  ui:
    image: direktiv-ui
    environment:
      - DIREKTIV_UI_PORT=8080
      - DIREKTIV_UI_BACKEND=http://flow:8181/api/
    ports:
      # api port
      - "8080:8080"
    depends_on:
      - flow

  e2e-api:
    image: node:lts-alpine3.18
    volumes:
      - ./tests:/tests
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - DIREKTIV_HOST=http://flow:8181
    command: npm --prefix /tests run jest -- ${JEST_PREFIX} --runInBand
    depends_on:
      - flow

  e2e-playwright:
    scale: 0
    image: node:18
    volumes:
      - ./ui:/ui
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - PLAYWRIGHT_USE_VITE=FALSE
      - PLAYWRIGHT_UI_BASE_URL=http://ui:8080
    command: >
      bash -c "cd ui
      && yarn
      && npx playwright install --with-deps chromium
      && yarn run e2e:headless-chromium-only"
    depends_on:
      - ui

